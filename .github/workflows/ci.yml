name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - uses: extractions/setup-just@v4
      - run: npm ci
      - run: just lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - uses: extractions/setup-just@v4
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: just test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker build .
